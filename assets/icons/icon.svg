<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00d4aa"/>
      <stop offset="100%" stop-color="#00a884"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="256" height="256" rx="48" ry="48" fill="url(#bg1)"/>

  <!-- Centered bar chart (4 bars, centered in canvas) -->
  <g transform="translate(0, 8)">
    <rect x="62" y="148" width="28" height="68" rx="6" fill="url(#bar1)"/>
    <rect x="98" y="112" width="28" height="104" rx="6" fill="url(#bar2)"/>
    <rect x="134" y="76" width="28" height="140" rx="6" fill="url(#bar3)"/>
    <rect x="170" y="132" width="28" height="84" rx="6" fill="url(#bar1)"/>
  </g>

  <!-- AI Robot Head — moved to the left -->
  <g transform="translate(42, 38)" filter="url(#shadow)">
    <!-- Head shape (rounded rect, slightly tilted) -->
    <rect x="0" y="8" width="52" height="44" rx="14" fill="#e2e8f0"/>
    <!-- Antenna stem -->
    <line x1="26" y1="8" x2="26" y2="-2" stroke="#e2e8f0" stroke-width="3" stroke-linecap="round"/>
    <!-- Antenna tip (glowing) -->
    <circle cx="26" cy="-4" r="5" fill="#f59e0b"/>
    <circle cx="26" cy="-4" r="2" fill="#fef3c7"/>
    <!-- Eyes -->
    <circle cx="16" cy="26" r="5" fill="#1a1a2e"/>
    <circle cx="36" cy="26" r="5" fill="#1a1a2e"/>
    <!-- Eye shine -->
    <circle cx="17.5" cy="24.5" r="1.5" fill="#fff"/>
    <circle cx="37.5" cy="24.5" r="1.5" fill="#fff"/>
    <!-- Mouth -->
    <rect x="18" y="38" width="16" height="4" rx="2" fill="#1a1a2e"/>
  </g>

  <!-- Cost / Token badge ($) overlapping bottom-right of bars -->
  <g transform="translate(186, 110)" filter="url(#shadow)">
    <circle cx="0" cy="0" r="22" fill="#f59e0b"/>
    <circle cx="0" cy="0" r="18" fill="none" stroke="#fbbf24" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="800" fill="#1a1a2e">$</text>
  </g>
</svg>
